<!DOCTYPE html>
<html>
<head>
  <title>AllocNow Demo App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>

  <h1>Frontend (SPA)</h1>
  <p>This is a simple Single Page Application V2</p>

  <button onclick="callBackend()">Call Backend API</button>

  <div id="result"></div>

  <script>
    async function callBackend() {
      try {
        const response = await fetch("/api/hello");
        const data = await response.json();
        document.getElementById("result").innerText = data.message;
      } catch (error) {
        document.getElementById("result").innerText = "Backend not reachable!";
      }
    }
  </script>

</body>
</html>
